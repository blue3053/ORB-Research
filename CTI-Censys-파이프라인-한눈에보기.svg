<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">CTI 기반 Censys 캠페인 후보 추적 파이프라인</title>
  <desc id="desc">CTI 정규화부터 Q0 Q1 enrichment, derived feature, 쿼리 동결, 전향 관측, 독립 검증, RQ1부터 RQ5 분석까지의 전체 흐름</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#22304a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#52627a"/>
    </marker>
    <style>
      .title { font: 700 38px 'Malgun Gothic','Segoe UI',sans-serif; fill:#17233b; }
      .subtitle { font: 400 19px 'Malgun Gothic','Segoe UI',sans-serif; fill:#52627a; }
      .stage-title { font: 700 24px 'Malgun Gothic','Segoe UI',sans-serif; fill:#17233b; }
      .box-title { font: 700 20px 'Malgun Gothic','Segoe UI',sans-serif; fill:#17233b; }
      .body { font: 400 17px 'Malgun Gothic','Segoe UI',sans-serif; fill:#35435a; }
      .small { font: 400 15px 'Malgun Gothic','Segoe UI',sans-serif; fill:#52627a; }
      .tiny { font: 400 14px 'Malgun Gothic','Segoe UI',sans-serif; fill:#52627a; }
      .white-title { font: 700 21px 'Malgun Gothic','Segoe UI',sans-serif; fill:white; }
      .white-body { font: 400 16px 'Malgun Gothic','Segoe UI',sans-serif; fill:white; }
      .chip { font: 700 14px 'Malgun Gothic','Segoe UI',sans-serif; fill:#23324b; }
      .stage-no { font: 700 20px 'Segoe UI',sans-serif; fill:white; text-anchor:middle; dominant-baseline:middle; }
      .line { stroke:#52627a; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .soft-line { stroke:#8a98ad; stroke-width:3; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="2000" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="130" fill="#17233b"/>
  <text x="70" y="58" class="title" fill="white" style="fill:white">CTI 기반 Censys 캠페인 후보 추적 파이프라인</text>
  <text x="72" y="96" class="subtitle" fill="#d7e2f2" style="fill:#d7e2f2">기존 CTI pivot + 신규 derived feature → 동결 쿼리 → 미래 후보 → 독립 검증</text>

  <!-- Legend -->
  <g transform="translate(75 150)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="28" y="15" class="small">CTI/Anchor</text>
    <rect x="170" y="0" width="18" height="18" rx="4" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="198" y="15" class="small">Censys enrichment</text>
    <rect x="390" y="0" width="18" height="18" rx="4" fill="#fef3c7" stroke="#d97706"/>
    <text x="418" y="15" class="small">Derived feature/query</text>
    <rect x="640" y="0" width="18" height="18" rx="4" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="668" y="15" class="small">Prospective</text>
    <rect x="805" y="0" width="18" height="18" rx="4" fill="#dcfce7" stroke="#16a34a"/>
    <text x="833" y="15" class="small">Independent validation</text>
  </g>

  <!-- Main lane background -->
  <rect x="60" y="200" width="1020" height="1720" rx="28" fill="#ffffff" stroke="#d6deea" filter="url(#shadow)"/>
  <text x="95" y="245" class="stage-title">실행 파이프라인</text>

  <!-- Stage 0/1 -->
  <g>
    <circle cx="105" cy="310" r="27" fill="#2563eb"/><text x="105" y="310" class="stage-no">1</text>
    <rect x="155" y="270" width="865" height="130" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="185" y="307" class="box-title">CTI 코퍼스 고정 · 정규화 · assertion 생성</text>
    <text x="185" y="340" class="body">Seed/direct pivot, campaign, node role, 원문 근거, confidence, 검토 상태</text>
    <text x="185" y="372" class="body">published_at · first_public_at · CTI reported first/last seen · available_at</text>
  </g>
  <path d="M587 405 L587 445" class="line"/>

  <!-- Stage 2/3 -->
  <g>
    <circle cx="105" cy="520" r="27" fill="#7c3aed"/><text x="105" y="520" class="stage-no">2</text>
    <rect x="155" y="450" width="415" height="190" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="182" y="486" class="box-title">Q0 Seed exact-IP</text>
    <text x="182" y="520" class="body">현재 host/service 관측</text>
    <text x="182" y="550" class="body">과거–현재 continuity 분리</text>
    <rect x="182" y="575" width="345" height="40" rx="10" fill="#dbeafe"/>
    <text x="198" y="601" class="small">continuous / probable / unknown / reassigned</text>

    <rect x="595" y="450" width="425" height="190" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="622" y="486" class="box-title">Q1 CTI direct pivot</text>
    <text x="622" y="520" class="body">singleton: broad/queryability precheck</text>
    <text x="622" y="550" class="body">CTI composite: 실제 enrichment</text>
    <rect x="622" y="575" width="355" height="40" rx="10" fill="#ede9fe"/>
    <text x="638" y="601" class="small">eligible / combination_only / blocked / pending</text>
  </g>

  <g>
    <rect x="330" y="660" width="515" height="48" rx="24" fill="#334155"/>
    <text x="587" y="691" class="white-body" text-anchor="middle">Gate A · 적격 Seed/pivot만 신규 특징의 source로 허용</text>
  </g>
  <path d="M587 710 L587 750" class="line"/>

  <!-- Derived feature -->
  <g>
    <circle cx="105" cy="830" r="27" fill="#d97706"/><text x="105" y="830" class="stage-no">3</text>
    <rect x="155" y="755" width="865" height="175" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="185" y="793" class="box-title">Q0/Q1에서 신규 derived feature 발굴</text>
    <text x="185" y="828" class="body">Anchor A에서 반복성 · Enrichment P에서 분포 · Matched Background B에서 희소성</text>
    <text x="185" y="860" class="body">certificate/SPKI · SSH key · JARM/JA4 · HTTP · portset · device · relation</text>
    <rect x="185" y="883" width="795" height="32" rx="10" fill="#fef3c7"/>
    <text x="582" y="905" class="small" text-anchor="middle">observed → recurrent → discriminative_candidate → query_eligible</text>
  </g>
  <path d="M587 935 L587 975" class="line"/>

  <!-- Query development -->
  <g>
    <circle cx="105" cy="1085" r="27" fill="#c2410c"/><text x="105" y="1085" class="stage-no">4</text>
    <rect x="155" y="980" width="865" height="255" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="185" y="1018" class="box-title">캠페인 후보 검색 쿼리 개발</text>
    <g transform="translate(185 1045)">
      <rect x="0" y="0" width="180" height="68" rx="12" fill="#dbeafe" stroke="#3b82f6"/>
      <text x="90" y="28" class="chip" text-anchor="middle">CTI-only</text><text x="90" y="50" class="tiny" text-anchor="middle">singleton/composite</text>
      <rect x="195" y="0" width="190" height="68" rx="12" fill="#fef3c7" stroke="#d97706"/>
      <text x="290" y="28" class="chip" text-anchor="middle">CTI + Derived</text><text x="290" y="50" class="tiny" text-anchor="middle">제안 방법의 핵심</text>
      <rect x="400" y="0" width="180" height="68" rx="12" fill="#ffedd5" stroke="#ea580c"/>
      <text x="490" y="28" class="chip" text-anchor="middle">Derived-only</text><text x="490" y="50" class="tiny" text-anchor="middle">CTI 변경 후 추적</text>
      <rect x="595" y="0" width="185" height="68" rx="12" fill="#ede9fe" stroke="#8b5cf6"/>
      <text x="687" y="28" class="chip" text-anchor="middle">Q3 Graph</text><text x="687" y="50" class="tiny" text-anchor="middle">관계 기반 확장</text>
    </g>
    <text x="185" y="1150" class="body">bounded precheck는 문법·0건·broad·비용만 확인하며 성능으로 계산하지 않음</text>
    <rect x="185" y="1172" width="795" height="42" rx="12" fill="#17233b"/>
    <text x="582" y="1200" class="white-body" text-anchor="middle">FREEZE · query + threshold + alert budget + schedule + validation rule</text>
  </g>
  <path d="M587 1240 L587 1280" class="line"/>

  <!-- Prospective -->
  <g>
    <circle cx="105" cy="1370" r="27" fill="#0f766e"/><text x="105" y="1370" class="stage-no">5</text>
    <rect x="155" y="1285" width="865" height="185" rx="18" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/>
    <text x="185" y="1323" class="box-title">전향적 반복 관측</text>
    <text x="185" y="1358" class="body">동결 query를 valid_for_test_from 이후 동일 조건으로 정기 실행</text>
    <text x="185" y="1390" class="body">raw pages → observations → entity_epoch → append-only candidate ledger</text>
    <rect x="185" y="1412" width="795" height="36" rx="10" fill="#ccfbf1"/>
    <text x="582" y="1437" class="small" text-anchor="middle">query match = technical_similarity_candidate (캠페인 멤버가 아님)</text>
  </g>
  <path d="M587 1475 L587 1515" class="line"/>

  <!-- Validation -->
  <g>
    <circle cx="105" cy="1600" r="27" fill="#16a34a"/><text x="105" y="1600" class="stage-no">6</text>
    <rect x="155" y="1520" width="865" height="175" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="185" y="1558" class="box-title">미래 독립 증거로 후보 등급 갱신</text>
    <text x="185" y="1593" class="body">미래 CTI · 검색에 쓰지 않은 지문 · malware/IR · 정상 재사용/재할당 반증</text>
    <text x="185" y="1625" class="body">동일 원출처 재게시와 discovery feature 재사용은 validation에서 제외</text>
    <rect x="185" y="1647" width="795" height="30" rx="10" fill="#dcfce7"/>
    <text x="582" y="1668" class="small" text-anchor="middle">positive / negative / contradicted / unresolved / unobservable</text>
  </g>
  <path d="M587 1700 L587 1740" class="line"/>

  <!-- Analysis -->
  <g>
    <circle cx="105" cy="1830" r="27" fill="#1e3a8a"/><text x="105" y="1830" class="stage-no">7</text>
    <rect x="155" y="1745" width="865" height="145" rx="18" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="185" y="1784" class="box-title">RQ별 분리 분석</text>
    <text x="185" y="1820" class="body">RQ1 landmark · RQ2 churn · RQ3 persistence/rarity · RQ4 discovery/lead time</text>
    <text x="185" y="1854" class="body">RQ5 baseline/precision 범위/FP·unresolved per day/비용</text>
  </g>

  <!-- Right sidebar -->
  <rect x="1115" y="200" width="425" height="1720" rx="28" fill="#ffffff" stroke="#d6deea" filter="url(#shadow)"/>
  <text x="1150" y="245" class="stage-title">읽을 때 지킬 경계</text>

  <g transform="translate(1145 275)">
    <rect x="0" y="0" width="365" height="190" rx="16" fill="#fff1f2" stroke="#e11d48"/>
    <text x="22" y="38" class="box-title">금지되는 등식</text>
    <text x="22" y="76" class="body">쿼리 일치 ≠ 캠페인 노드</text>
    <text x="22" y="108" class="body">Q1 공통값 ≠ 캠페인 특징</text>
    <text x="22" y="140" class="body">반복 일치 ≠ 독립 검증</text>
    <text x="22" y="172" class="body">미관측 ≠ 소멸</text>
  </g>

  <g transform="translate(1145 495)">
    <rect x="0" y="0" width="365" height="320" rx="16" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="22" y="38" class="box-title">날짜는 서로 대체하지 않음</text>
    <text x="22" y="76" class="small">1. campaign reported first seen</text>
    <path d="M40 88 L40 105" class="soft-line"/>
    <text x="22" y="130" class="small">2. CTI first public</text>
    <path d="M40 142 L40 159" class="soft-line"/>
    <text x="22" y="184" class="small">3. Censys observed</text>
    <path d="M40 196 L40 213" class="soft-line"/>
    <text x="22" y="238" class="small">4. study first candidate</text>
    <path d="M40 250 L40 267" class="soft-line"/>
    <text x="22" y="292" class="small">5. future evidence / validation</text>
  </g>

  <g transform="translate(1145 845)">
    <rect x="0" y="0" width="365" height="390" rx="16" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="22" y="38" class="box-title">Evidence grade</text>
    <rect x="22" y="60" width="320" height="42" rx="10" fill="#e2e8f0"/><text x="182" y="87" class="small" text-anchor="middle">raw_hit</text>
    <path d="M182 105 L182 125" class="soft-line"/>
    <rect x="22" y="130" width="320" height="42" rx="10" fill="#fef3c7"/><text x="182" y="157" class="small" text-anchor="middle">technical_similarity_candidate</text>
    <path d="M182 175 L182 195" class="soft-line"/>
    <rect x="22" y="200" width="320" height="42" rx="10" fill="#ffedd5"/><text x="182" y="227" class="small" text-anchor="middle">probable_campaign_link</text>
    <path d="M182 245 L182 265" class="soft-line"/>
    <rect x="22" y="270" width="320" height="42" rx="10" fill="#dcfce7"/><text x="182" y="297" class="small" text-anchor="middle">high_confidence_campaign_link</text>
    <path d="M182 315 L182 335" class="soft-line"/>
    <rect x="22" y="340" width="320" height="42" rx="10" fill="#bbf7d0"/><text x="182" y="367" class="small" text-anchor="middle">confirmed_campaign_member</text>
  </g>

  <g transform="translate(1145 1265)">
    <rect x="0" y="0" width="365" height="400" rx="16" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="22" y="38" class="box-title">RQ 연결</text>
    <rect x="22" y="62" width="70" height="42" rx="21" fill="#dbeafe"/><text x="57" y="89" class="chip" text-anchor="middle">RQ1</text>
    <text x="110" y="89" class="body">Q0 landmark·continuity</text>
    <rect x="22" y="120" width="70" height="42" rx="21" fill="#ccfbf1"/><text x="57" y="147" class="chip" text-anchor="middle">RQ2</text>
    <text x="110" y="147" class="body">미래 계층별 churn</text>
    <rect x="22" y="178" width="70" height="42" rx="21" fill="#fef3c7"/><text x="57" y="205" class="chip" text-anchor="middle">RQ3</text>
    <text x="110" y="205" class="body">특징 지속성·희소성</text>
    <rect x="22" y="236" width="70" height="42" rx="21" fill="#dcfce7"/><text x="57" y="263" class="chip" text-anchor="middle">RQ4</text>
    <text x="110" y="263" class="body">미래 독립검증·lead time</text>
    <rect x="22" y="294" width="70" height="42" rx="21" fill="#ede9fe"/><text x="57" y="321" class="chip" text-anchor="middle">RQ5</text>
    <text x="110" y="321" class="body">동일 budget 방법 비교</text>
    <text x="22" y="370" class="small">각 RQ는 입력 cohort와 분모를 분리한다.</text>
  </g>

  <g transform="translate(1145 1695)">
    <rect x="0" y="0" width="365" height="185" rx="16" fill="#f8fafc" stroke="#64748b"/>
    <text x="22" y="38" class="box-title">핵심 산출물</text>
    <text x="22" y="72" class="small">• immutable raw + manifests</text>
    <text x="22" y="102" class="small">• feature/query provenance</text>
    <text x="22" y="132" class="small">• candidate/evidence ledger</text>
    <text x="22" y="162" class="small">• cutoff별 timeline/RQ datasets</text>
  </g>
</svg>
